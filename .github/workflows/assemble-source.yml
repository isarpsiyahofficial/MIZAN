name: MIZAN round 3 full verification

on:
  pull_request:
  workflow_dispatch:

permissions:
  contents: read
  actions: read

jobs:
  verify-build:
    runs-on: ubuntu-latest
    timeout-minutes: 50
    steps:
      - uses: actions/checkout@v4

      - name: Check out actual pull request branch
        if: github.event_name == 'pull_request'
        run: |
          git fetch origin "$GITHUB_HEAD_REF" --depth=1
          git checkout -B "$GITHUB_HEAD_REF" FETCH_HEAD

      - name: Download latest verified phone source
        uses: actions/download-artifact@v4
        with:
          name: lefferion-prime-mizan-phone-feedback-verified-source
          repository: isarpsiyahofficial/MIZAN
          run-id: 29778390280
          github-token: ${{ secrets.GITHUB_TOKEN }}
          path: .baseline-artifact

      - name: Restore SHA-verified phone source
        shell: bash
        run: |
          set -euo pipefail
          python3 - <<'PY'
          from pathlib import Path
          import hashlib
          import shutil
          import zipfile

          root = Path.cwd()
          artifact_dir = root / '.baseline-artifact'
          archives = sorted(artifact_dir.glob('*.zip'))
          if len(archives) != 1:
              raise SystemExit(f'Beklenen tek telefon kaynak ZIP bulunamadı: {archives}')

          archive = archives[0]
          expected_sha = 'f12213eabfacba455c5bab593b069020bf661a1ba1ba519a6fdf6f59650f069b'
          actual_sha = hashlib.sha256(archive.read_bytes()).hexdigest()
          if actual_sha != expected_sha:
              raise SystemExit(
                  f'Telefon kaynak ZIP SHA uyuşmuyor: {actual_sha} != {expected_sha}'
              )

          extract_root = Path('/tmp/mizan-round3-phone-baseline')
          preserve_root = Path('/tmp/mizan-round3-branch-files')
          shutil.rmtree(extract_root, ignore_errors=True)
          shutil.rmtree(preserve_root, ignore_errors=True)
          extract_root.mkdir(parents=True)
          preserve_root.mkdir(parents=True)

          with zipfile.ZipFile(archive) as source_zip:
              source_zip.extractall(extract_root)

          source = extract_root / 'LEFFERION-PRIME-MIZAN-PHONE-FEEDBACK'
          if not source.is_dir():
              raise SystemExit(f'Doğrulanmış telefon kaynak kökü bulunamadı: {source}')

          preserve = [
              Path('.github/workflows/assemble-source.yml'),
              Path('tools/apply_round3_patch.py'),
              Path('round3_patch_chunks'),
          ]
          for relative in preserve:
              current = root / relative
              target = preserve_root / relative
              if current.is_dir():
                  target.parent.mkdir(parents=True, exist_ok=True)
                  shutil.copytree(current, target)
              elif current.is_file():
                  target.parent.mkdir(parents=True, exist_ok=True)
                  shutil.copy2(current, target)
              else:
                  raise SystemExit(f'Korunacak round 3 dosyası eksik: {relative}')

          for child in root.iterdir():
              if child.name == '.git':
                  continue
              if child.is_dir():
                  shutil.rmtree(child)
              else:
                  child.unlink()

          for child in source.iterdir():
              target = root / child.name
              if child.is_dir():
                  shutil.copytree(child, target)
              else:
                  shutil.copy2(child, target)

          for child in preserve_root.iterdir():
              target = root / child.name
              if child.is_dir():
                  shutil.copytree(child, target, dirs_exist_ok=True)
              else:
                  shutil.copy2(child, target)

          required = [
              'lib/main.dart',
              'lib/models/mizan_models.dart',
              'lib/screens/reports_screen.dart',
              'lib/screens/settings_screen.dart',
              'test/ui_interaction_test.dart',
              'tools/apply_round3_patch.py',
          ]
          missing = [relative for relative in required if not (root / relative).is_file()]
          if missing:
              raise SystemExit(f'Doğrulanmış telefon tabanı eksik: {missing}')

          print(f'Doğrulanmış telefon kaynağı geri yüklendi: SHA-256 {actual_sha}')
          PY

      - name: Apply SHA-verified round 3 revision
        shell: bash
        run: |
          set -o pipefail
          mkdir -p ci-logs
          python3 tools/apply_round3_patch.py 2>&1 | tee ci-logs/round3-patch.log

      - uses: actions/setup-java@v4
        with:
          distribution: temurin
          java-version: "17"

      - uses: subosito/flutter-action@v2
        with:
          flutter-version: "3.44.0"
          channel: stable
          cache: true

      - name: Generate and normalize Android project
        run: flutter create . --platforms=android --org com.lefferionprime --project-name lefferion_prime_mizan

      - name: Configure Android
        run: python3 tools/configure_android.py

      - name: Resolve dependencies
        run: flutter pub get

      - name: Format source
        run: dart format lib test

      - name: Run complete diagnostics
        shell: bash
        run: |
          mkdir -p ci-logs
          : > ci-logs/results.txt
          run_check() {
            local name="$1"
            shift
            set +e
            "$@" >"ci-logs/${name}.log" 2>&1
            local code=$?
            set -e
            echo "${name}=${code}" | tee -a ci-logs/results.txt
            cat "ci-logs/${name}.log"
          }
          run_check visuals flutter test test/visual_capture_test.dart --update-goldens
          run_check launcher dart run flutter_launcher_icons
          run_check analyze flutter analyze --fatal-warnings
          run_check requirements python3 tools/validate_project.py
          run_check pdf flutter test test/pdf_report_test.dart --reporter expanded
          run_check reports flutter test test/report_service_test.dart --reporter expanded
          run_check tests flutter test --reporter expanded
          run_check apk flutter build apk --release

      - name: Upload visual review screenshots
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: mizan-round3-ui-screenshots
          path: test/goldens/*.png
          if-no-files-found: warn
          retention-days: 30

      - name: Upload diagnostic logs
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: mizan-round3-ci-diagnostics
          path: ci-logs/
          if-no-files-found: error
          retention-days: 14

      - name: Upload APK if generated
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: lefferion-prime-mizan-round3-unsigned-release
          path: build/app/outputs/flutter-apk/app-release.apk
          if-no-files-found: ignore
          retention-days: 30

      - name: Enforce every verification gate
        if: always()
        run: |
          python3 - <<'PY'
          from pathlib import Path

          expected = {
              'visuals', 'launcher', 'analyze', 'requirements',
              'pdf', 'reports', 'tests', 'apk'
          }
          result_file = Path('ci-logs/results.txt')
          if not result_file.exists():
              raise SystemExit('Tanılama sonuç dosyası oluşturulamadı.')
          results = {}
          for line in result_file.read_text().splitlines():
              name, code = line.split('=', 1)
              results[name] = int(code)
          missing = sorted(expected - results.keys())
          if missing:
              raise SystemExit(f'Çalıştırılmayan zorunlu kontroller: {missing}')
          failed = {name: code for name, code in results.items() if code != 0}
          if failed:
              raise SystemExit(f'Başarısız kontroller: {failed}')
          print('MİZAN round 3 bütün zorunlu kontrolleri geçti.')
          PY

      - name: Package exact verified Flutter source
        run: |
          python3 - <<'PY'
          from pathlib import Path
          import shutil
          import zipfile

          root = Path.cwd()
          stage = root / 'dist' / 'LEFFERION-PRIME-MIZAN-ROUND3'
          archive = root / 'dist' / 'LEFFERION-PRIME-MIZAN-ROUND3-SOURCE.zip'
          if stage.parent.exists():
              shutil.rmtree(stage.parent)
          stage.mkdir(parents=True)

          excluded_roots = {
              '.git', '.dart_tool', 'build', 'ci-logs', 'dist',
              '.source_parts', 'patch_chunks_v3', 'feedback_patch_chunks',
              'round3_patch_chunks', 'revision_parts', 'revision_chunks_v2'
          }
          excluded_files = {
              '.flutter-plugins', '.flutter-plugins-dependencies',
              '.packages', 'local.properties', '.mizan_round3.patch',
              'apply_round3_patch.py'
          }
          for source in root.rglob('*'):
              relative = source.relative_to(root)
              if not relative.parts:
                  continue
              if relative.parts[0] in excluded_roots or source.name in excluded_files:
                  continue
              target = stage / relative
              if source.is_dir():
                  target.mkdir(parents=True, exist_ok=True)
              elif source.is_file():
                  target.parent.mkdir(parents=True, exist_ok=True)
                  shutil.copy2(source, target)

          with zipfile.ZipFile(archive, 'w', compression=zipfile.ZIP_DEFLATED) as output:
              for source in stage.rglob('*'):
                  if source.is_file():
                      output.write(source, source.relative_to(stage.parent))
          print(f'Doğrulanmış round 3 kaynak ZIP: {archive} ({archive.stat().st_size} bayt)')
          PY

      - name: Upload exact verified source ZIP
        uses: actions/upload-artifact@v4
        with:
          name: lefferion-prime-mizan-round3-verified-source
          path: dist/LEFFERION-PRIME-MIZAN-ROUND3-SOURCE.zip
          if-no-files-found: error
          retention-days: 30
