name: Assemble, verify and build MIZAN

on:
  push:
    branches: [main]
  pull_request:
  workflow_dispatch:

permissions:
  contents: write

jobs:
  assemble-quality-build:
    runs-on: ubuntu-latest
    timeout-minutes: 45
    steps:
      - uses: actions/checkout@v4
      - name: Check out actual pull request branch
        if: github.event_name == 'pull_request'
        run: |
          git fetch origin "$GITHUB_HEAD_REF" --depth=1
          git checkout -B "$GITHUB_HEAD_REF" FETCH_HEAD
      - name: Assemble transparent source fragments
        run: python3 tools/assemble_source.py
      - name: Apply CI-confirmed source corrections
        shell: bash
        run: |
          mkdir -p ci-logs
          exec > >(tee ci-logs/patch.log) 2>&1
          set -e
          python3 - <<'PY'
          import binascii
          import struct
          import zlib
          from pathlib import Path

          root = Path('.')

          path = root / 'lib/core/theme.dart'
          text = path.read_text(encoding='utf-8').replace('cardTheme: CardTheme(', 'cardTheme: CardThemeData(')
          path.write_text(text, encoding='utf-8')

          path = root / 'lib/models/mizan_models.dart'
          text = path.read_text(encoding='utf-8').replace('.fold(0,', '.fold<double>(0.0,')
          path.write_text(text, encoding='utf-8')

          path = root / 'lib/services/notification_service.dart'
          text = path.read_text(encoding='utf-8')
          text = text.replace('timezone.name', 'timezone.identifier')
          text = text.replace('scheduleMode: mode,', 'androidScheduleMode: mode,')
          path.write_text(text, encoding='utf-8')

          path = root / 'lib/controllers/mizan_controller.dart'
          text = path.read_text(encoding='utf-8')
          text = text.replace(
              "  MizanController(\n    this._store, {\n    ReminderScheduler scheduler = const NoopReminderScheduler(),\n  }) : _scheduler = scheduler;",
              "  MizanController(\n    this._store, {\n    this._scheduler = const NoopReminderScheduler(),\n  });",
          )
          for message in ('Ödeme kaynağı bulunamadı.', 'Not kaynağı bulunamadı.'):
              text = text.replace(
                  f"    }}\n    throw ArgumentError('{message}');\n  }}",
                  "    }\n  }",
              )
          path.write_text(text, encoding='utf-8')

          path = root / 'lib/screens/record_form_dialogs.dart'
          text = path.read_text(encoding='utf-8')
          start = text.find('String? _positiveNumber(')
          if start != -1:
              end = text.find('\n\nclass _PersonForm', start)
              text = text[:start] + text[end + 2:]
          path.write_text(text, encoding='utf-8')

          for relative in ('.github/workflows/android-release.yml', 'tools/validate_project.py'):
              path = root / relative
              text = path.read_text(encoding='utf-8').replace('flutter analyze --fatal-infos', 'flutter analyze --fatal-warnings')
              path.write_text(text, encoding='utf-8')

          widget_test = root / 'test/widget_test.dart'
          widget_test.write_text("""import 'package:flutter_test/flutter_test.dart';
          import 'package:lefferion_prime_mizan/controllers/mizan_controller.dart';
          import 'package:lefferion_prime_mizan/main.dart';
          import 'package:lefferion_prime_mizan/models/mizan_models.dart';
          import 'package:lefferion_prime_mizan/services/local_store.dart';

          class _MemoryStore implements MizanStore {
            _MemoryStore(this.state);
            MizanState state;
            @override
            Future<StoreLoadResult> load() async => StoreLoadResult(state: state, source: StoreLoadSource.primary);
            @override
            Future<void> reset(MizanState value) async => state = value;
            @override
            Future<void> save(MizanState value) async => state = value;
          }

          void main() {
            testWidgets('uygulama ana başlığı açılır', (tester) async {
              final controller = MizanController(_MemoryStore(MizanState.seed()));
              await controller.load();
              await tester.pumpWidget(MizanApp(controller: controller));
              await tester.pumpAndSettle();
              expect(find.text('LEFFERION PRIME - MIZAN'), findsOneWidget);
              expect(tester.takeException(), isNull);
            });
          }
          """, encoding='utf-8')

          size = 512
          scale = 2
          high = size * scale
          transparent = (0, 0, 0, 0)
          cream = (250, 249, 246, 255)
          green = (112, 128, 105, 255)
          gold = (191, 149, 64, 255)
          dark_gold = (172, 128, 47, 255)
          pixels = [[transparent for _ in range(high)] for _ in range(high)]
          center = high / 2

          for y in range(high):
              for x in range(high):
                  dx = x + 0.5 - center
                  dy = y + 0.5 - center
                  radius = (dx * dx + dy * dy) ** 0.5
                  color = transparent
                  if radius <= 190 * scale:
                      color = cream
                  if 177 * scale <= radius <= 184 * scale:
                      color = green
                  if 165 * scale <= radius <= 169 * scale:
                      color = gold
                  if 128 * scale <= radius <= 131 * scale:
                      color = dark_gold

                  in_l = (
                      187 * scale <= x <= 221 * scale and 145 * scale <= y <= 346 * scale
                  ) or (
                      187 * scale <= x <= 301 * scale and 311 * scale <= y <= 346 * scale
                  )
                  if in_l:
                      color = green

                  in_p_stem = 242 * scale <= x <= 268 * scale and 164 * scale <= y <= 346 * scale
                  px = (x - 274 * scale) / (72 * scale)
                  py = (y - 216 * scale) / (59 * scale)
                  outer = px * px + py * py <= 1
                  inner_px = (x - 274 * scale) / (46 * scale)
                  inner_py = (y - 216 * scale) / (34 * scale)
                  inner = inner_px * inner_px + inner_py * inner_py < 1
                  in_p_loop = outer and not inner and x >= 250 * scale and y <= 278 * scale
                  if in_p_stem or in_p_loop:
                      color = gold
                  pixels[y][x] = color

          rgba = bytearray()
          for y in range(size):
              for x in range(size):
                  samples = [
                      pixels[y * scale + oy][x * scale + ox]
                      for oy in range(scale)
                      for ox in range(scale)
                  ]
                  for channel in range(4):
                      rgba.append(round(sum(pixel[channel] for pixel in samples) / len(samples)))

          def png_chunk(kind, data):
              crc = binascii.crc32(kind + data) & 0xffffffff
              return struct.pack('>I', len(data)) + kind + data + struct.pack('>I', crc)

          rows = bytearray()
          stride = size * 4
          for y in range(size):
              rows.append(0)
              rows.extend(rgba[y * stride:(y + 1) * stride])
          png = bytearray(b'\x89PNG\r\n\x1a\n')
          png.extend(png_chunk(b'IHDR', struct.pack('>IIBBBBB', size, size, 8, 6, 0, 0, 0)))
          png.extend(png_chunk(b'IDAT', zlib.compress(bytes(rows), 9)))
          png.extend(png_chunk(b'IEND', b''))
          logo = root / 'assets/brand/lefferion-prime-logo.png'
          logo.write_bytes(bytes(png))
          print(f'Şeffaf LP adaptif ikon üretildi: {len(png)} bayt.')
          PY
      - uses: actions/setup-java@v4
        with:
          distribution: temurin
          java-version: "17"
      - uses: subosito/flutter-action@v2
        with:
          flutter-version: "3.44.0"
          channel: stable
          cache: true
      - name: Generate Android project
        run: flutter create . --platforms=android --org com.lefferionprime --project-name lefferion_prime_mizan
      - name: Configure Android
        run: python3 tools/configure_android.py
      - name: Dependencies
        run: flutter pub get
      - name: Format and parse
        run: dart format lib test
      - name: Run complete diagnostics
        shell: bash
        run: |
          mkdir -p ci-logs
          : > ci-logs/results.txt
          run_check() {
            local name="$1"
            shift
            set +e
            "$@" >"ci-logs/${name}.log" 2>&1
            local code=$?
            set -e
            echo "${name}=${code}" | tee -a ci-logs/results.txt
            cat "ci-logs/${name}.log"
          }
          run_check visuals flutter test test/visual_capture_test.dart --update-goldens
          run_check launcher dart run flutter_launcher_icons
          run_check analyze flutter analyze --fatal-warnings
          run_check requirements python3 tools/validate_project.py
          run_check tests flutter test --reporter expanded
          run_check apk flutter build apk --release
      - name: Upload visual review screenshots
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: mizan-ui-screenshots
          path: test/goldens/*.png
          if-no-files-found: error
          retention-days: 30
      - name: Upload diagnostic logs
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: mizan-ci-diagnostics
          path: ci-logs/
          if-no-files-found: error
          retention-days: 14
      - name: Upload APK if generated
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: lefferion-prime-mizan-unsigned-release
          path: build/app/outputs/flutter-apk/app-release.apk
          if-no-files-found: ignore
          retention-days: 30
      - name: Enforce all checks
        if: always()
        run: |
          python3 - <<'PY'
          from pathlib import Path
          result_file = Path('ci-logs/results.txt')
          if not result_file.exists():
              raise SystemExit('Tanılama sonuç dosyası oluşturulamadı. patch.log dosyasını inceleyin.')
          results = {}
          for line in result_file.read_text().splitlines():
              name, code = line.split('=', 1)
              results[name] = int(code)
          failed = {name: code for name, code in results.items() if code != 0}
          if failed:
              raise SystemExit(f"Başarısız kontroller: {failed}")
          print('Tüm kontroller başarılı.')
          PY
      - name: Commit verified normal source to pull request branch
        if: github.event_name == 'pull_request'
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git add -A
          git commit -m "feat: publish verified MIZAN Flutter source"
          git push origin HEAD:"$GITHUB_HEAD_REF"
