name: Assemble, verify and build MIZAN

on:
  push:
    branches: [main]
  pull_request:
  workflow_dispatch:

permissions:
  contents: write

jobs:
  assemble-quality-build:
    runs-on: ubuntu-latest
    timeout-minutes: 45
    steps:
      - uses: actions/checkout@v4
      - name: Assemble transparent source fragments
        run: python3 tools/assemble_source.py
      - name: Commit normal source tree
        if: github.event_name == 'push'
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git add -A
          git commit -m "feat: assemble verified MIZAN source" || true
          git push
      - uses: actions/setup-java@v4
        with:
          distribution: temurin
          java-version: "17"
      - uses: subosito/flutter-action@v2
        with:
          flutter-version: "3.44.0"
          channel: stable
          cache: true
      - name: Generate Android project
        run: flutter create . --platforms=android --org com.lefferionprime --project-name lefferion_prime_mizan
      - name: Configure Android
        run: python3 tools/configure_android.py
      - name: Dependencies
        run: flutter pub get
      - name: Format and parse
        run: dart format lib test
      - name: Run complete diagnostics
        shell: bash
        run: |
          mkdir -p ci-logs
          : > ci-logs/results.txt
          run_check() {
            local name="$1"
            shift
            set +e
            "$@" >"ci-logs/${name}.log" 2>&1
            local code=$?
            set -e
            echo "${name}=${code}" | tee -a ci-logs/results.txt
            cat "ci-logs/${name}.log"
          }
          run_check launcher dart run flutter_launcher_icons
          run_check analyze flutter analyze --fatal-infos
          run_check requirements python3 tools/validate_project.py
          run_check tests flutter test --reporter expanded
          run_check apk flutter build apk --release
      - name: Upload diagnostic logs
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: mizan-ci-diagnostics
          path: ci-logs/
          if-no-files-found: error
          retention-days: 14
      - name: Upload APK if generated
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: lefferion-prime-mizan-unsigned-release
          path: build/app/outputs/flutter-apk/app-release.apk
          if-no-files-found: ignore
          retention-days: 30
      - name: Enforce all checks
        if: always()
        run: |
          python3 - <<'PY'
          from pathlib import Path
          results = {}
          for line in Path('ci-logs/results.txt').read_text().splitlines():
              name, code = line.split('=', 1)
              results[name] = int(code)
          failed = {name: code for name, code in results.items() if code != 0}
          if failed:
              raise SystemExit(f"Başarısız kontroller: {failed}")
          print('Tüm kontroller başarılı.')
          PY
