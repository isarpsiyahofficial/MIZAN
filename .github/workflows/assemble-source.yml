name: Assemble, verify and build MIZAN

on:
  push:
    branches: [main]
  pull_request:
  workflow_dispatch:

permissions:
  contents: write

jobs:
  assemble-quality-build:
    runs-on: ubuntu-latest
    timeout-minutes: 40
    steps:
      - uses: actions/checkout@v4
      - name: Assemble transparent source fragments
        run: python3 tools/assemble_source.py
      - name: Commit normal source tree
        if: github.event_name == 'push'
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git add -A
          git commit -m "feat: assemble verified MIZAN source" || true
          git push
      - uses: actions/setup-java@v4
        with:
          distribution: temurin
          java-version: "17"
      - uses: subosito/flutter-action@v2
        with:
          flutter-version: "3.44.0"
          channel: stable
          cache: true
      - name: Generate Android project
        run: flutter create . --platforms=android --org com.lefferionprime --project-name lefferion_prime_mizan
      - name: Configure Android
        run: python3 tools/configure_android.py
      - name: Dependencies
        run: flutter pub get
      - name: Format and parse
        run: dart format lib test
      - name: Launcher icons
        run: dart run flutter_launcher_icons
      - name: Analyze
        run: flutter analyze --fatal-infos
      - name: Requirement structure check
        run: python3 tools/validate_project.py
      - name: Tests
        run: flutter test --reporter expanded
      - name: Release APK
        run: flutter build apk --release
      - name: Upload APK
        uses: actions/upload-artifact@v4
        with:
          name: lefferion-prime-mizan-unsigned-release
          path: build/app/outputs/flutter-apk/app-release.apk
          if-no-files-found: error
