name: MIZAN v2 safe verification

on:
  pull_request:
  workflow_dispatch:

permissions:
  contents: read

jobs:
  verify-build:
    runs-on: ubuntu-latest
    timeout-minutes: 45
    steps:
      - uses: actions/checkout@v4

      - name: Check out actual pull request branch
        if: github.event_name == 'pull_request'
        run: |
          git fetch origin "$GITHUB_HEAD_REF" --depth=1
          git checkout -B "$GITHUB_HEAD_REF" FETCH_HEAD

      - name: Assemble verified baseline
        run: python3 tools/assemble_source.py

      - name: Apply SHA-verified MIZAN v2 revision
        run: python3 tools/apply_revision_patch.py

      - uses: actions/setup-java@v4
        with:
          distribution: temurin
          java-version: "17"

      - uses: subosito/flutter-action@v2
        with:
          flutter-version: "3.44.0"
          channel: stable
          cache: true

      - name: Generate Android project
        run: flutter create . --platforms=android --org com.lefferionprime --project-name lefferion_prime_mizan

      - name: Configure Android
        run: python3 tools/configure_android.py

      - name: Dependencies
        run: flutter pub get

      - name: Format
        run: dart format lib test

      - name: Run complete diagnostics
        shell: bash
        run: |
          mkdir -p ci-logs
          : > ci-logs/results.txt
          run_check() {
            local name="$1"
            shift
            set +e
            "$@" >"ci-logs/${name}.log" 2>&1
            local code=$?
            set -e
            echo "${name}=${code}" | tee -a ci-logs/results.txt
            cat "ci-logs/${name}.log"
          }
          run_check visuals flutter test test/visual_capture_test.dart --update-goldens
          run_check launcher dart run flutter_launcher_icons
          run_check analyze flutter analyze --fatal-warnings
          run_check requirements python3 tools/validate_project.py
          run_check tests flutter test --reporter expanded
          run_check apk flutter build apk --release

      - name: Upload visual review screenshots
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: mizan-v2-ui-screenshots
          path: test/goldens/*.png
          if-no-files-found: warn
          retention-days: 30

      - name: Upload diagnostic logs
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: mizan-v2-ci-diagnostics
          path: ci-logs/
          if-no-files-found: error
          retention-days: 14

      - name: Upload APK if generated
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: lefferion-prime-mizan-v2-unsigned-release
          path: build/app/outputs/flutter-apk/app-release.apk
          if-no-files-found: ignore
          retention-days: 30

      - name: Enforce all checks
        if: always()
        run: |
          python3 - <<'PY'
          from pathlib import Path
          result_file = Path('ci-logs/results.txt')
          if not result_file.exists():
              raise SystemExit('Tanılama sonuç dosyası oluşturulamadı.')
          results = {}
          for line in result_file.read_text().splitlines():
              name, code = line.split('=', 1)
              results[name] = int(code)
          failed = {name: code for name, code in results.items() if code != 0}
          if failed:
              raise SystemExit(f'Başarısız kontroller: {failed}')
          print('MIZAN v2 tüm zorunlu kontrolleri geçti.')
          PY

      - name: Package exact verified Flutter source
        run: |
          python3 - <<'PY'
          from pathlib import Path
          import shutil
          import zipfile

          root = Path.cwd()
          stage = root / 'dist' / 'LEFFERION-PRIME-MIZAN-V2'
          archive = root / 'dist' / 'LEFFERION-PRIME-MIZAN-V2-SOURCE.zip'
          if stage.parent.exists():
              shutil.rmtree(stage.parent)
          stage.mkdir(parents=True)

          excluded_roots = {
              '.git', '.dart_tool', 'build', 'ci-logs', 'dist',
              '.source_parts', 'patch_chunks_v3', 'revision_parts',
              'revision_chunks_v2'
          }
          excluded_files = {
              '.flutter-plugins', '.flutter-plugins-dependencies',
              '.packages', 'local.properties'
          }
          for source in root.rglob('*'):
              relative = source.relative_to(root)
              if not relative.parts:
                  continue
              if relative.parts[0] in excluded_roots or source.name in excluded_files:
                  continue
              target = stage / relative
              if source.is_dir():
                  target.mkdir(parents=True, exist_ok=True)
              elif source.is_file():
                  target.parent.mkdir(parents=True, exist_ok=True)
                  shutil.copy2(source, target)

          with zipfile.ZipFile(archive, 'w', compression=zipfile.ZIP_DEFLATED) as output:
              for source in stage.rglob('*'):
                  if source.is_file():
                      output.write(source, source.relative_to(stage.parent))
          print(f'Doğrulanmış MIZAN v2 kaynak ZIP: {archive} ({archive.stat().st_size} bayt)')
          PY

      - name: Upload exact verified project source ZIP
        uses: actions/upload-artifact@v4
        with:
          name: lefferion-prime-mizan-v2-verified-source
          path: dist/LEFFERION-PRIME-MIZAN-V2-SOURCE.zip
          if-no-files-found: error
          retention-days: 30
