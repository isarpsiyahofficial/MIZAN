name: MIZAN all-time report and notification UI verification

on:
  push:
    branches: [agent/mizan-report-alltime-notification-ui]
  pull_request:
    branches: [agent/mizan-safe-clear-ui-v2]
  workflow_dispatch:

permissions:
  contents: read
  actions: read

env:
  FLUTTER_VERSION: "3.44.0"
  SOURCE_ROOT: workspace/LEFFERION-PRIME-MIZAN-CSV-MERGE-FIX-FINAL

jobs:
  verify-report-and-notification-ui:
    runs-on: ubuntu-latest
    timeout-minutes: 70
    steps:
      - name: Checkout isolated patch layer
        uses: actions/checkout@v4

      - name: Download exact verified previous source
        uses: actions/download-artifact@v4
        with:
          name: lefferion-prime-mizan-csv-merge-fix-source
          repository: isarpsiyahofficial/MIZAN
          run-id: 29942363965
          github-token: ${{ secrets.GITHUB_TOKEN }}
          path: .baseline-artifact

      - name: Verify and restore exact source
        shell: bash
        run: |
          set -euo pipefail
          python3 - <<'PY'
          from pathlib import Path
          import hashlib
          import shutil
          import zipfile

          archives = sorted(Path('.baseline-artifact').rglob('*.zip'))
          if len(archives) != 1:
              raise SystemExit(f'Beklenen tek kaynak ZIP bulunamadı: {archives}')
          archive = archives[0]
          expected = '543e10713c237248a792c9328a76882ff89c00617da7305b5272490546e92731'
          actual = hashlib.sha256(archive.read_bytes()).hexdigest()
          if actual != expected:
              raise SystemExit(f'Kaynak SHA uyuşmuyor: {actual} != {expected}')
          workspace = Path('workspace')
          shutil.rmtree(workspace, ignore_errors=True)
          workspace.mkdir()
          with zipfile.ZipFile(archive) as source_zip:
              source_zip.extractall(workspace)
          root = workspace / 'LEFFERION-PRIME-MIZAN-CSV-MERGE-FIX-FINAL'
          if not (root / 'pubspec.yaml').is_file():
              raise SystemExit(f'Kaynak kökü bulunamadı: {root}')
          print(f'Doğrulanmış kaynak geri yüklendi: SHA-256 {actual}')
          PY

      - name: Apply only requested report and notification UI changes
        run: python3 tools/apply_report_alltime_notification_ui.py "$SOURCE_ROOT"

      - name: Set up Java 17
        uses: actions/setup-java@v4
        with:
          distribution: temurin
          java-version: "17"

      - name: Set up Flutter
        uses: subosito/flutter-action@v2
        with:
          flutter-version: ${{ env.FLUTTER_VERSION }}
          channel: stable
          cache: true

      - name: Prepare Android and dependencies
        working-directory: ${{ env.SOURCE_ROOT }}
        run: |
          flutter create . --platforms=android --org com.lefferionprime --project-name lefferion_prime_mizan
          python3 tools/configure_android.py
          flutter pub get
          dart format lib test

      - name: Run targeted and complete regression gates
        shell: bash
        working-directory: ${{ env.SOURCE_ROOT }}
        run: |
          set -euo pipefail
          mkdir -p ci-logs
          : > ci-logs/results.txt
          run_check() {
            local name="$1"
            shift
            set +e
            "$@" >"ci-logs/${name}.log" 2>&1
            local code=$?
            set -e
            echo "${name}=${code}" | tee -a ci-logs/results.txt
            cat "ci-logs/${name}.log"
          }
          run_check visuals flutter test test/visual_capture_test.dart --update-goldens
          run_check launcher dart run flutter_launcher_icons
          run_check analyze flutter analyze --fatal-warnings
          run_check requirements python3 tools/validate_project.py
          run_check report_service flutter test test/report_service_test.dart --reporter expanded
          run_check report_ui flutter test test/ui_interaction_test.dart --plain-name "Giderler ve Raporlar ilk bakışta sade başlıklarla açılır" --reporter expanded
          run_check notification_ui flutter test test/ui_interaction_test.dart --plain-name "Bildirim ayarları özet ve ayrıntı olarak açık biçimde ayrılır" --reporter expanded
          run_check responsive flutter test test/responsive_test.dart --reporter expanded
          run_check notification flutter test test/alarm_regression_test.dart test/reminder_engine_test.dart --reporter expanded
          run_check csv flutter test test/csv_backup_test.dart --reporter expanded
          run_check income flutter test test/income_payday_tracking_test.dart test/income_monthly_due_notification_v5_test.dart --reporter expanded
          run_check reports_pdf flutter test test/report_service_test.dart test/pdf_report_test.dart --reporter expanded
          run_check all_tests flutter test --reporter expanded
          run_check apk flutter build apk --release

      - name: Verify exact scope and APK
        working-directory: ${{ env.SOURCE_ROOT }}
        run: |
          set -euo pipefail
          APK=build/app/outputs/flutter-apk/app-release.apk
          test -s "$APK"
          unzip -t "$APK" > ci-logs/apk-zip-test.log
          python3 - <<'PY'
          from pathlib import Path
          reports = Path('lib/screens/reports_screen.dart').read_text()
          settings = Path('lib/screens/settings_screen.dart').read_text()
          checks = [
              ('Tüm zamanlar seçeneği', 'ReportPeriod.allTime' in reports and 'Tüm kayıt geçmişi' in reports),
              ('Sade bildirim merkezi', 'Bildirim ve alarm sistemi' in settings and 'Bildirimleri yeniden planla' in settings),
              ('Ayrıntıda bildirim türü', 'SegmentedButton<NotificationPresentationMode>' in settings),
              ('Eski büyük seçim kartları kaldırıldı', 'class _ModeChoice' not in settings),
          ]
          failed = [name for name, ok in checks if not ok]
          if failed:
              raise SystemExit(f'İstenen kapsam doğrulanamadı: {failed}')
          print('Yalnız rapor dönemi ve bildirim ayar arayüzü değiştirildi.')
          PY

      - name: Enforce every gate
        if: always()
        working-directory: ${{ env.SOURCE_ROOT }}
        run: |
          python3 - <<'PY'
          from pathlib import Path
          expected = {
              'visuals', 'launcher', 'analyze', 'requirements', 'report_service',
              'report_ui', 'notification_ui', 'responsive', 'notification',
              'csv', 'income', 'reports_pdf', 'all_tests', 'apk'
          }
          path = Path('ci-logs/results.txt')
          if not path.exists():
              raise SystemExit('Sonuç dosyası oluşturulamadı.')
          results = {}
          for line in path.read_text().splitlines():
              name, code = line.split('=', 1)
              results[name] = int(code)
          missing = sorted(expected - results.keys())
          failed = {name: code for name, code in results.items() if code != 0}
          if missing:
              raise SystemExit(f'Çalıştırılmayan kapılar: {missing}')
          if failed:
              raise SystemExit(f'Başarısız kapılar: {failed}')
          print('Rapor ve bildirim UI sürümü bütün kapıları geçti.')
          PY

      - name: Package exact verified source
        if: always()
        shell: bash
        run: |
          python3 - <<'PY'
          from pathlib import Path
          import shutil
          import zipfile
          root = Path('workspace/LEFFERION-PRIME-MIZAN-CSV-MERGE-FIX-FINAL')
          dist = Path('dist')
          stage = dist / 'LEFFERION-PRIME-MIZAN-REPORT-ALLTIME-NOTIFICATION-UI-FINAL'
          archive = dist / 'LEFFERION-PRIME-MIZAN-REPORT-ALLTIME-NOTIFICATION-UI-FINAL-SOURCE.zip'
          shutil.rmtree(dist, ignore_errors=True)
          stage.mkdir(parents=True)
          excluded_roots = {'.git', '.dart_tool', 'build', 'ci-logs', 'dist', '.gradle'}
          excluded_files = {'.flutter-plugins', '.flutter-plugins-dependencies', '.packages', 'local.properties'}
          for source in root.rglob('*'):
              relative = source.relative_to(root)
              if not relative.parts or any(part in excluded_roots for part in relative.parts) or source.name in excluded_files:
                  continue
              target = stage / relative
              if source.is_dir():
                  target.mkdir(parents=True, exist_ok=True)
              elif source.is_file():
                  target.parent.mkdir(parents=True, exist_ok=True)
                  shutil.copy2(source, target)
          with zipfile.ZipFile(archive, 'w', zipfile.ZIP_DEFLATED) as output:
              for source in stage.rglob('*'):
                  if source.is_file():
                      output.write(source, source.relative_to(stage.parent))
          print(f'Doğrulanmış kaynak: {archive}')
          PY

      - name: Upload diagnostics
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: mizan-report-alltime-notification-ui-diagnostics
          path: ${{ env.SOURCE_ROOT }}/ci-logs/
          if-no-files-found: error
          retention-days: 14

      - name: Upload responsive screenshots
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: mizan-report-alltime-notification-ui-screenshots
          path: ${{ env.SOURCE_ROOT }}/test/goldens/*.png
          if-no-files-found: warn
          retention-days: 30

      - name: Upload release APK
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: lefferion-prime-mizan-report-alltime-notification-ui-release
          path: ${{ env.SOURCE_ROOT }}/build/app/outputs/flutter-apk/app-release.apk
          if-no-files-found: ignore
          retention-days: 30

      - name: Upload exact source
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: lefferion-prime-mizan-report-alltime-notification-ui-source
          path: dist/LEFFERION-PRIME-MIZAN-REPORT-ALLTIME-NOTIFICATION-UI-FINAL-SOURCE.zip
          if-no-files-found: error
          retention-days: 30
