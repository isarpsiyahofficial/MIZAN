name: MIZAN manual overdue synchronization verification

on:
  push:
    branches: [agent/mizan-manual-overdue-sync-fix]
  pull_request:
    branches: [agent/mizan-safe-clear-ui-v2]
  workflow_dispatch:

permissions:
  contents: read
  actions: read

env:
  FLUTTER_VERSION: "3.44.0"
  SOURCE_ROOT: workspace/LEFFERION-PRIME-MIZAN-DYNAMIC-OVERDUE-CALENDAR-FINAL

jobs:
  verify-manual-overdue-sync:
    runs-on: ubuntu-latest
    timeout-minutes: 80
    steps:
      - name: Checkout isolated patch layer
        uses: actions/checkout@v4

      - name: Download exact verified previous source
        uses: actions/download-artifact@v4
        with:
          name: lefferion-prime-mizan-dynamic-overdue-final-source
          repository: isarpsiyahofficial/MIZAN
          run-id: 30080098748
          github-token: ${{ secrets.GITHUB_TOKEN }}
          path: .baseline-artifact

      - name: Verify and restore exact source
        shell: bash
        run: |
          set -euo pipefail
          python3 - <<'PY'
          from pathlib import Path
          import hashlib
          import shutil
          import zipfile

          archives = sorted(Path('.baseline-artifact').rglob('*.zip'))
          if len(archives) != 1:
              raise SystemExit(f'Beklenen tek kaynak ZIP bulunamadı: {archives}')
          archive = archives[0]
          expected = '56d67b239052901eb6b1685d5e0a4203b87212068bc2d6eba08760d20dc3177e'
          actual = hashlib.sha256(archive.read_bytes()).hexdigest()
          if actual != expected:
              raise SystemExit(f'Kaynak SHA uyuşmuyor: {actual} != {expected}')
          workspace = Path('workspace')
          shutil.rmtree(workspace, ignore_errors=True)
          workspace.mkdir()
          with zipfile.ZipFile(archive) as source_zip:
              source_zip.extractall(workspace)
          root = workspace / 'LEFFERION-PRIME-MIZAN-DYNAMIC-OVERDUE-CALENDAR-FINAL'
          if not (root / 'pubspec.yaml').is_file():
              raise SystemExit(f'Kaynak kökü bulunamadı: {root}')
          print(f'Doğrulanmış kaynak geri yüklendi: SHA-256 {actual}')
          PY

      - name: Apply only manual overdue synchronization changes
        run: python3 tools/apply_manual_overdue_sync_fix.py "$SOURCE_ROOT"

      - name: Set up Java 17
        uses: actions/setup-java@v4
        with:
          distribution: temurin
          java-version: "17"

      - name: Set up Flutter
        uses: subosito/flutter-action@v2
        with:
          flutter-version: ${{ env.FLUTTER_VERSION }}
          channel: stable
          cache: true

      - name: Prepare Android and dependencies
        working-directory: ${{ env.SOURCE_ROOT }}
        run: |
          flutter create . --platforms=android --org com.lefferionprime --project-name lefferion_prime_mizan
          python3 tools/configure_android.py
          flutter pub get
          dart format lib test

      - name: Capture every verification gate
        working-directory: ${{ env.SOURCE_ROOT }}
        shell: bash
        run: |
          set -euo pipefail
          mkdir -p ci-logs
          : > ci-logs/results.txt
          run_check() {
            local name="$1"
            shift
            set +e
            "$@" >"ci-logs/${name}.log" 2>&1
            local code=$?
            set -e
            echo "${name}=${code}" | tee -a ci-logs/results.txt
            cat "ci-logs/${name}.log"
          }
          run_check visuals flutter test test/visual_capture_test.dart --update-goldens
          run_check launcher dart run flutter_launcher_icons
          run_check analyze flutter analyze --fatal-warnings
          run_check requirements python3 tools/validate_project.py
          run_check overdue flutter test test/overdue_calendar_tracking_test.dart --reporter expanded
          run_check overdue_ui flutter test test/manual_overdue_edit_confirmation_test.dart --reporter expanded
          run_check models flutter test test/model_test.dart test/final_installment_period_test.dart --reporter expanded
          run_check controller flutter test test/controller_test.dart test/local_store_test.dart --reporter expanded
          run_check csv flutter test test/csv_backup_test.dart --reporter expanded
          run_check reminders flutter test test/reminder_engine_test.dart test/alarm_regression_test.dart test/automatic_notification_sync_test.dart --reporter expanded
          run_check reports flutter test test/report_service_test.dart test/pdf_report_test.dart --reporter expanded
          run_check responsive flutter test test/responsive_test.dart test/ui_interaction_test.dart --reporter expanded
          run_check all_tests flutter test --reporter expanded
          run_check apk flutter build apk --release
          if [ -s build/app/outputs/flutter-apk/app-release.apk ]; then
            unzip -t build/app/outputs/flutter-apk/app-release.apk > ci-logs/apk-zip-test.log 2>&1
          fi

      - name: Verify exact requested scope
        working-directory: ${{ env.SOURCE_ROOT }}
        run: |
          set -euo pipefail
          test -s build/app/outputs/flutter-apk/app-release.apk
          python3 - <<'PY'
          from pathlib import Path

          models = Path('lib/models/mizan_models.dart').read_text()
          controller = Path('lib/controllers/mizan_controller.dart').read_text()
          form = Path('lib/screens/record_form_dialogs.dart').read_text()
          tests = Path('test/overdue_calendar_tracking_test.dart').read_text()
          ui_test = Path('test/manual_overdue_edit_confirmation_test.dart').read_text()
          checks = [
              ('eski manuel referans önceliği', '_earliestOverdueAnchorAt' in models),
              ('dinamik manuel gün görünümü', 'currentManualOverdueDaysAt' in models),
              ('ilgisiz kayıtta koruma', 'replaceManualOverdueDays' in controller),
              ('salt okunur gecikme alanı', 'Güncel manuel gecikme günü' in form),
              ('ayrı değişiklik işlemi', 'Gecikme gününü değiştir' in form),
              ('ayrı onay penceresi', 'Değişikliği onayla' in form),
              ('46 yerine 19 regresyonu', 'manuel gecikme daha eskiyse' in tests),
              ('30 gün sabit kalma regresyonu', 'manuel 30 gün ertesi günlerde' in tests),
              ('onay arayüz testi', 'manuel gecikme değişikliği ayrı onay ister' in ui_test),
          ]
          failed = [name for name, ok in checks if not ok]
          if failed:
              raise SystemExit(f'İstenen kapsam doğrulanamadı: {failed}')
          print('Yalnız manuel gecikme senkronizasyonu ve güvenli düzenleme akışı değiştirildi.')
          PY

      - name: Enforce every gate
        if: always()
        working-directory: ${{ env.SOURCE_ROOT }}
        run: |
          python3 - <<'PY'
          from pathlib import Path
          expected = {
              'visuals', 'launcher', 'analyze', 'requirements', 'overdue',
              'overdue_ui', 'models', 'controller', 'csv', 'reminders',
              'reports', 'responsive', 'all_tests', 'apk'
          }
          path = Path('ci-logs/results.txt')
          if not path.exists():
              raise SystemExit('Sonuç dosyası oluşturulamadı.')
          results = {}
          for line in path.read_text().splitlines():
              name, code = line.split('=', 1)
              results[name] = int(code)
          missing = sorted(expected - results.keys())
          failed = {name: code for name, code in results.items() if code != 0}
          if missing:
              raise SystemExit(f'Çalıştırılmayan kapılar: {missing}')
          if failed:
              raise SystemExit(f'Başarısız kapılar: {failed}')
          print('Manuel gecikme senkronizasyon sürümü bütün kapıları geçti.')
          PY

      - name: Package verified source
        if: success()
        shell: bash
        run: |
          python3 - <<'PY'
          from pathlib import Path
          import shutil
          import zipfile

          root = Path('workspace/LEFFERION-PRIME-MIZAN-DYNAMIC-OVERDUE-CALENDAR-FINAL')
          dist = Path('dist')
          stage = dist / 'LEFFERION-PRIME-MIZAN-MANUAL-OVERDUE-SYNC-FINAL'
          archive = dist / 'LEFFERION-PRIME-MIZAN-MANUAL-OVERDUE-SYNC-FINAL-SOURCE.zip'
          shutil.rmtree(dist, ignore_errors=True)
          stage.mkdir(parents=True)
          excluded_roots = {'.git', '.dart_tool', 'build', 'ci-logs', 'dist', '.gradle'}
          excluded_files = {'.flutter-plugins', '.flutter-plugins-dependencies', '.packages', 'local.properties'}
          for source in root.rglob('*'):
              relative = source.relative_to(root)
              if not relative.parts or any(part in excluded_roots for part in relative.parts) or source.name in excluded_files:
                  continue
              target = stage / relative
              if source.is_dir():
                  target.mkdir(parents=True, exist_ok=True)
              elif source.is_file():
                  target.parent.mkdir(parents=True, exist_ok=True)
                  shutil.copy2(source, target)
          with zipfile.ZipFile(archive, 'w', zipfile.ZIP_DEFLATED) as output:
              for source in stage.rglob('*'):
                  if source.is_file():
                      output.write(source, source.relative_to(stage.parent))
          print(f'Doğrulanmış kaynak: {archive}')
          PY

      - name: Upload diagnostics
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: mizan-manual-overdue-sync-diagnostics
          path: ${{ env.SOURCE_ROOT }}/ci-logs/
          if-no-files-found: error
          retention-days: 14

      - name: Upload release APK
        if: success()
        uses: actions/upload-artifact@v4
        with:
          name: lefferion-prime-mizan-manual-overdue-sync-release
          path: ${{ env.SOURCE_ROOT }}/build/app/outputs/flutter-apk/app-release.apk
          if-no-files-found: error
          retention-days: 30

      - name: Upload verified source
        if: success()
        uses: actions/upload-artifact@v4
        with:
          name: lefferion-prime-mizan-manual-overdue-sync-source
          path: dist/LEFFERION-PRIME-MIZAN-MANUAL-OVERDUE-SYNC-FINAL-SOURCE.zip
          if-no-files-found: error
          retention-days: 30
