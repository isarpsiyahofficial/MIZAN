name: MIZAN final full verification

on:
  pull_request:
  workflow_dispatch:

permissions:
  contents: read
  actions: read

jobs:
  verify-final:
    runs-on: ubuntu-latest
    timeout-minutes: 55
    steps:
      - uses: actions/checkout@v4

      - name: Check out actual pull request branch
        if: github.event_name == 'pull_request'
        run: |
          git fetch origin "$GITHUB_HEAD_REF" --depth=1
          git checkout -B "$GITHUB_HEAD_REF" FETCH_HEAD

      - name: Download latest verified phone source
        uses: actions/download-artifact@v4
        with:
          name: lefferion-prime-mizan-phone-feedback-verified-source
          repository: isarpsiyahofficial/MIZAN
          run-id: 29778390280
          github-token: ${{ secrets.GITHUB_TOKEN }}
          path: .baseline-artifact

      - name: Restore SHA-verified source and Round 3 layer
        shell: bash
        run: |
          set -euo pipefail
          python3 - <<'PY'
          from pathlib import Path
          import hashlib
          import shutil
          import zipfile

          root = Path.cwd()
          archives = sorted((root / '.baseline-artifact').glob('*.zip'))
          if len(archives) != 1:
              raise SystemExit(f'Beklenen tek kaynak ZIP bulunamadı: {archives}')
          archive = archives[0]
          expected = 'f12213eabfacba455c5bab593b069020bf661a1ba1ba519a6fdf6f59650f069b'
          actual = hashlib.sha256(archive.read_bytes()).hexdigest()
          if actual != expected:
              raise SystemExit(f'Telefon kaynak ZIP SHA uyuşmuyor: {actual} != {expected}')

          extract = Path('/tmp/mizan-final-base')
          preserve = Path('/tmp/mizan-final-preserve')
          shutil.rmtree(extract, ignore_errors=True)
          shutil.rmtree(preserve, ignore_errors=True)
          extract.mkdir(parents=True)
          preserve.mkdir(parents=True)
          with zipfile.ZipFile(archive) as zf:
              zf.extractall(extract)
          source = extract / 'LEFFERION-PRIME-MIZAN-PHONE-FEEDBACK'
          if not source.is_dir():
              raise SystemExit(f'Kaynak kökü bulunamadı: {source}')

          for relative in [
              Path('.github/workflows/final-verification.yml'),
              Path('tools/apply_round3_patch.py'),
              Path('round3_patch_chunks_v2'),
              Path('round3_newfiles_chunks'),
          ]:
              current = root / relative
              target = preserve / relative
              if current.is_dir():
                  target.parent.mkdir(parents=True, exist_ok=True)
                  shutil.copytree(current, target)
              elif current.is_file():
                  target.parent.mkdir(parents=True, exist_ok=True)
                  shutil.copy2(current, target)
              else:
                  raise SystemExit(f'Korunacak final dosyası eksik: {relative}')

          for child in root.iterdir():
              if child.name == '.git':
                  continue
              if child.is_dir():
                  shutil.rmtree(child)
              else:
                  child.unlink()
          for child in source.iterdir():
              target = root / child.name
              if child.is_dir():
                  shutil.copytree(child, target)
              else:
                  shutil.copy2(child, target)
          for child in preserve.iterdir():
              target = root / child.name
              if child.is_dir():
                  shutil.copytree(child, target, dirs_exist_ok=True)
              else:
                  shutil.copy2(child, target)
          print(f'Final kaynak tabanı geri yüklendi: SHA-256 {actual}')
          PY

      - name: Apply SHA-verified Round 3 revision
        shell: bash
        run: |
          mkdir -p ci-logs
          set -o pipefail
          python3 tools/apply_round3_patch.py 2>&1 | tee ci-logs/round3-patch.log

      - name: Correct installment due amounts for rent and installment records
        shell: bash
        run: |
          set -euo pipefail
          python3 - <<'PY'
          from pathlib import Path

          replacements = {
              Path('lib/models/mizan_models.dart'): (
                  '''              amount: rent.remainingAmount,
              dueDate: rent.dueDate,''',
                  '''              amount: rent.scheduledPaymentAmount,
              dueDate: rent.dueDate,''',
              ),
              Path('lib/services/report_service.dart'): (
                  '''          amount: rent.remainingAmount,
          dueDate: rent.dueDate,''',
                  '''          amount: rent.scheduledPaymentAmount,
          dueDate: rent.dueDate,''',
              ),
          }
          for path, (old, new) in replacements.items():
              text = path.read_text(encoding='utf-8')
              count = text.count(old)
              if count != 1:
                  raise SystemExit(f'{path}: beklenen kira/taksit hesap bloğu {count} kez bulundu.')
              path.write_text(text.replace(old, new, 1), encoding='utf-8')
          print('Kira/taksit yaklaşan ve rapor tutarları sıradaki dönem tutarına bağlandı.')
          PY

      - uses: actions/setup-java@v4
        with:
          distribution: temurin
          java-version: '17'

      - uses: subosito/flutter-action@v2
        with:
          flutter-version: '3.44.0'
          channel: stable
          cache: true

      - name: Generate Android project
        run: flutter create . --platforms=android --org com.lefferionprime --project-name lefferion_prime_mizan

      - name: Configure Android
        run: python3 tools/configure_android.py

      - name: Resolve dependencies
        run: flutter pub get

      - name: Format source
        run: dart format lib test

      - name: Run complete final diagnostics
        shell: bash
        run: |
          mkdir -p ci-logs
          : > ci-logs/results.txt
          run_check() {
            local name="$1"
            shift
            set +e
            "$@" >"ci-logs/${name}.log" 2>&1
            local code=$?
            set -e
            echo "${name}=${code}" | tee -a ci-logs/results.txt
            cat "ci-logs/${name}.log"
          }
          run_check visuals flutter test test/visual_capture_test.dart --update-goldens
          run_check launcher dart run flutter_launcher_icons
          run_check analyze flutter analyze --fatal-warnings
          run_check requirements python3 tools/validate_project.py
          run_check pdf flutter test test/pdf_report_test.dart --reporter expanded
          run_check reports flutter test test/report_service_test.dart --reporter expanded
          run_check tests flutter test --reporter expanded
          run_check apk flutter build apk --release

      - name: Upload final screenshots
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: mizan-final-ui-screenshots
          path: test/goldens/*.png
          if-no-files-found: warn
          retention-days: 30

      - name: Upload final diagnostics
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: mizan-final-ci-diagnostics
          path: ci-logs/
          if-no-files-found: error
          retention-days: 14

      - name: Upload final APK
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: lefferion-prime-mizan-final-unsigned-release
          path: build/app/outputs/flutter-apk/app-release.apk
          if-no-files-found: ignore
          retention-days: 30

      - name: Enforce every final gate
        if: always()
        run: |
          python3 - <<'PY'
          from pathlib import Path
          expected = {'visuals', 'launcher', 'analyze', 'requirements', 'pdf', 'reports', 'tests', 'apk'}
          path = Path('ci-logs/results.txt')
          if not path.exists():
              raise SystemExit('Final sonuç dosyası oluşturulamadı.')
          results = {}
          for line in path.read_text().splitlines():
              name, code = line.split('=', 1)
              results[name] = int(code)
          missing = sorted(expected - results.keys())
          failed = {name: code for name, code in results.items() if code != 0}
          if missing:
              raise SystemExit(f'Çalıştırılmayan final kontrolleri: {missing}')
          if failed:
              raise SystemExit(f'Başarısız final kontrolleri: {failed}')
          print('MİZAN bütün final doğrulama kapılarını geçti.')
          PY

      - name: Package exact verified final source
        run: |
          python3 - <<'PY'
          from pathlib import Path
          import shutil
          import zipfile
          root = Path.cwd()
          stage = root / 'dist' / 'LEFFERION-PRIME-MIZAN-FINAL'
          archive = root / 'dist' / 'LEFFERION-PRIME-MIZAN-FINAL-SOURCE.zip'
          shutil.rmtree(stage.parent, ignore_errors=True)
          stage.mkdir(parents=True)
          excluded_roots = {
              '.git', '.dart_tool', 'build', 'ci-logs', 'dist',
              'round3_patch_chunks_v2', 'round3_newfiles_chunks'
          }
          excluded_files = {
              '.flutter-plugins', '.flutter-plugins-dependencies', '.packages',
              'local.properties', 'apply_round3_patch.py'
          }
          for source in root.rglob('*'):
              relative = source.relative_to(root)
              if not relative.parts:
                  continue
              if relative.parts[0] in excluded_roots or source.name in excluded_files:
                  continue
              target = stage / relative
              if source.is_dir():
                  target.mkdir(parents=True, exist_ok=True)
              elif source.is_file():
                  target.parent.mkdir(parents=True, exist_ok=True)
                  shutil.copy2(source, target)
          with zipfile.ZipFile(archive, 'w', zipfile.ZIP_DEFLATED) as output:
              for source in stage.rglob('*'):
                  if source.is_file():
                      output.write(source, source.relative_to(stage.parent))
          print(f'Final kaynak ZIP: {archive} ({archive.stat().st_size} bayt)')
          PY

      - name: Upload exact verified final source
        uses: actions/upload-artifact@v4
        with:
          name: lefferion-prime-mizan-final-verified-source
          path: dist/LEFFERION-PRIME-MIZAN-FINAL-SOURCE.zip
          if-no-files-found: error
          retention-days: 30
