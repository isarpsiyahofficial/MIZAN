name: MIZAN isolated automatic notification final

on:
  push:
    branches: [agent/mizan-auto-notification-sync-ci2]
  pull_request:
    branches: [ci/notification-verification-base]
  workflow_dispatch:

permissions:
  contents: read
  actions: read

env:
  FLUTTER_VERSION: "3.44.0"
  SOURCE_ROOT: workspace/LEFFERION-PRIME-MIZAN-REPORT-ALLTIME-NOTIFICATION-UI-FINAL

jobs:
  verify:
    runs-on: ubuntu-latest
    timeout-minutes: 70
    steps:
      - uses: actions/checkout@v4

      - name: Restore exact verified source
        uses: actions/download-artifact@v4
        with:
          name: lefferion-prime-mizan-report-alltime-notification-ui-source
          repository: isarpsiyahofficial/MIZAN
          run-id: 29952061398
          github-token: ${{ secrets.GITHUB_TOKEN }}
          path: .baseline-artifact

      - name: Verify source and apply notification-only patch
        shell: bash
        run: |
          set -euo pipefail
          python3 - <<'PY'
          from pathlib import Path
          import hashlib, shutil, zipfile
          archive = next(Path('.baseline-artifact').rglob('*.zip'))
          expected = '307e9bbe999b6c71e4cb1d7ca103a9aee7ab6587da04e1e3a5462ab24c968033'
          actual = hashlib.sha256(archive.read_bytes()).hexdigest()
          if actual != expected:
              raise SystemExit(f'Kaynak SHA uyuşmuyor: {actual}')
          shutil.rmtree('workspace', ignore_errors=True)
          Path('workspace').mkdir()
          with zipfile.ZipFile(archive) as zf:
              zf.extractall('workspace')
          PY
          python3 tools/apply_automatic_notification_sync.py "$SOURCE_ROOT"

      - uses: actions/setup-java@v4
        with:
          distribution: temurin
          java-version: "17"

      - uses: subosito/flutter-action@v2
        with:
          flutter-version: ${{ env.FLUTTER_VERSION }}
          channel: stable
          cache: true

      - name: Analyze, test and build exact release
        working-directory: ${{ env.SOURCE_ROOT }}
        shell: bash
        run: |
          set -euo pipefail
          flutter create . --platforms=android --org com.lefferionprime --project-name lefferion_prime_mizan
          python3 tools/configure_android.py
          flutter pub get
          dart format lib test
          flutter analyze --fatal-warnings
          python3 tools/validate_project.py
          flutter test test/automatic_notification_sync_test.dart --reporter expanded
          flutter test --reporter expanded
          flutter build apk --release
          unzip -t build/app/outputs/flutter-apk/app-release.apk
          ! grep -q 'Bildirimleri yeniden planla' lib/screens/settings_screen.dart
          ! grep -q 'Bildirim izinlerini aç' lib/screens/settings_screen.dart
          ! grep -q 'Dakik alarm iznini aç' lib/screens/settings_screen.dart
          grep -q 'AndroidScheduleMode.exactAllowWhileIdle' lib/services/notification_service.dart
          grep -q 'AppLifecycleState.resumed' lib/main.dart

      - name: Package verified source
        shell: bash
        run: |
          python3 - <<'PY'
          from pathlib import Path
          import zipfile
          root = Path('workspace/LEFFERION-PRIME-MIZAN-REPORT-ALLTIME-NOTIFICATION-UI-FINAL')
          out = Path('dist/LEFFERION-PRIME-MIZAN-AUTO-NOTIFICATION-SYNC-FINAL-SOURCE.zip')
          out.parent.mkdir(exist_ok=True)
          excluded = {'.git', '.dart_tool', 'build', '.gradle', 'local.properties'}
          with zipfile.ZipFile(out, 'w', zipfile.ZIP_DEFLATED) as zf:
              for path in root.rglob('*'):
                  rel = path.relative_to(root)
                  if path.is_file() and not any(part in excluded for part in rel.parts):
                      zf.write(path, Path('LEFFERION-PRIME-MIZAN-AUTO-NOTIFICATION-SYNC-FINAL') / rel)
          PY

      - name: Upload APK
        uses: actions/upload-artifact@v4
        with:
          name: lefferion-prime-mizan-auto-notification-sync-final-apk
          path: ${{ env.SOURCE_ROOT }}/build/app/outputs/flutter-apk/app-release.apk
          if-no-files-found: error
          retention-days: 30

      - name: Upload source
        uses: actions/upload-artifact@v4
        with:
          name: lefferion-prime-mizan-auto-notification-sync-final-source
          path: dist/LEFFERION-PRIME-MIZAN-AUTO-NOTIFICATION-SYNC-FINAL-SOURCE.zip
          if-no-files-found: error
          retention-days: 30
