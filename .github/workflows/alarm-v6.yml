name: MIZAN Alarm V6 release verification

on:
  pull_request:
    branches:
      - agent/mizan-safe-clear-ui-v2
  workflow_dispatch:

permissions:
  contents: read
  actions: read

jobs:
  verify-alarm-release:
    runs-on: ubuntu-latest
    timeout-minutes: 60
    steps:
      - uses: actions/checkout@v4

      - name: Check out actual pull request branch
        if: github.event_name == 'pull_request'
        run: |
          git fetch origin "$GITHUB_HEAD_REF" --depth=1
          git checkout -B "$GITHUB_HEAD_REF" FETCH_HEAD

      - name: Download last fully verified income V5 source
        uses: actions/download-artifact@v4
        with:
          name: lefferion-prime-mizan-income-v5-verified-source
          repository: isarpsiyahofficial/MIZAN
          run-id: 29868307597
          github-token: ${{ secrets.GITHUB_TOKEN }}
          path: .baseline-artifact

      - name: Restore SHA-verified V5 source
        shell: bash
        run: |
          set -euo pipefail
          python3 - <<'PY'
          from pathlib import Path
          import hashlib
          import shutil
          import zipfile

          root = Path.cwd()
          archives = sorted((root / '.baseline-artifact').rglob('*.zip'))
          if len(archives) != 1:
              raise SystemExit(f'Beklenen tek V5 kaynak ZIP bulunamadı: {archives}')
          archive = archives[0]
          expected = '0b353fd1695f3f4dde6aad72f978e4f374afedf5e3915e975dfebc6e066b6b57'
          actual = hashlib.sha256(archive.read_bytes()).hexdigest()
          if actual != expected:
              raise SystemExit(f'V5 kaynak SHA uyuşmuyor: {actual} != {expected}')

          extract = Path('/tmp/mizan-alarm-v6-base')
          preserve = Path('/tmp/mizan-alarm-v6-preserve')
          shutil.rmtree(extract, ignore_errors=True)
          shutil.rmtree(preserve, ignore_errors=True)
          extract.mkdir(parents=True)
          preserve.mkdir(parents=True)
          with zipfile.ZipFile(archive) as source_zip:
              source_zip.extractall(extract)
          source = extract / 'LEFFERION-PRIME-MIZAN-INCOME-V5'
          if not source.is_dir():
              raise SystemExit(f'V5 kaynak kökü bulunamadı: {source}')

          keep = [
              Path('.github/workflows/alarm-v6.yml'),
              Path('tools/alarm_v6'),
          ]
          for relative in keep:
              current = root / relative
              target = preserve / relative
              if current.is_dir():
                  target.parent.mkdir(parents=True, exist_ok=True)
                  shutil.copytree(current, target)
              elif current.is_file():
                  target.parent.mkdir(parents=True, exist_ok=True)
                  shutil.copy2(current, target)
              else:
                  raise SystemExit(f'Korunacak Alarm V6 dosyası eksik: {relative}')

          for child in root.iterdir():
              if child.name == '.git':
                  continue
              if child.is_dir():
                  shutil.rmtree(child)
              else:
                  child.unlink()
          for child in source.iterdir():
              target = root / child.name
              if child.is_dir():
                  shutil.copytree(child, target)
              else:
                  shutil.copy2(child, target)
          for child in preserve.iterdir():
              target = root / child.name
              if child.is_dir():
                  shutil.copytree(child, target, dirs_exist_ok=True)
              else:
                  shutil.copy2(child, target)
          print(f'Doğrulanmış V5 kaynak geri yüklendi: SHA-256 {actual}')
          PY

      - name: Apply Alarm V6 without replacing working modules
        shell: bash
        run: |
          set -euo pipefail
          mkdir -p ci-logs
          for script in tools/alarm_v6/*.py; do
            echo "Running $script" | tee -a ci-logs/alarm-v6-apply.log
            python3 "$script" 2>&1 | tee -a ci-logs/alarm-v6-apply.log
          done

      - uses: actions/setup-java@v4
        with:
          distribution: temurin
          java-version: '17'

      - uses: subosito/flutter-action@v2
        with:
          flutter-version: '3.44.0'
          channel: stable
          cache: true

      - name: Generate and configure Android project
        run: |
          flutter create . --platforms=android --org com.lefferionprime --project-name lefferion_prime_mizan
          python3 tools/configure_android.py

      - name: Resolve dependencies and format
        run: |
          flutter pub get
          dart format lib test

      - name: Run complete diagnostics and release build
        shell: bash
        run: |
          set -euo pipefail
          mkdir -p ci-logs
          : > ci-logs/results.txt
          run_check() {
            local name="$1"
            shift
            set +e
            "$@" >"ci-logs/${name}.log" 2>&1
            local code=$?
            set -e
            echo "${name}=${code}" | tee -a ci-logs/results.txt
            cat "ci-logs/${name}.log"
          }
          run_check visuals flutter test test/visual_capture_test.dart --update-goldens
          run_check launcher dart run flutter_launcher_icons
          run_check analyze flutter analyze --fatal-warnings
          run_check requirements python3 tools/validate_project.py
          run_check alarm_tests flutter test test/reminder_engine_test.dart test/model_test.dart test/controller_test.dart --reporter expanded
          run_check all_tests flutter test --reporter expanded
          run_check apk flutter build apk --release

      - name: Verify notification and alarm APK contents
        shell: bash
        run: |
          set -euo pipefail
          APK=build/app/outputs/flutter-apk/app-release.apk
          test -s "$APK"
          unzip -t "$APK" > ci-logs/apk-zip-test.log
          unzip -l "$APK" > ci-logs/apk-files.log
          grep -q 'res/raw/mizan_soft' ci-logs/apk-files.log
          grep -q 'res/raw/mizan_alert' ci-logs/apk-files.log
          python3 - <<'PY'
          from pathlib import Path
          manifest = Path('android/app/src/main/AndroidManifest.xml').read_text()
          required = [
              'android.permission.POST_NOTIFICATIONS',
              'android.permission.RECEIVE_BOOT_COMPLETED',
              'android.permission.SCHEDULE_EXACT_ALARM',
              'ScheduledNotificationReceiver',
              'ScheduledNotificationBootReceiver',
              'android.intent.action.BOOT_COMPLETED',
              'android.intent.action.MY_PACKAGE_REPLACED',
          ]
          missing = [item for item in required if item not in manifest]
          if missing:
              raise SystemExit(f'Bildirim/alarm manifest öğeleri eksik: {missing}')

          service = Path('lib/services/notification_service.dart').read_text()
          required_service = [
              'zonedSchedule',
              'AndroidScheduleMode.exactAllowWhileIdle',
              'AndroidScheduleMode.inexactAllowWhileIdle',
              'AudioAttributesUsage.alarm',
              'AndroidNotificationCategory.alarm',
              "RawResourceAndroidNotificationSound('mizan_soft')",
              "RawResourceAndroidNotificationSound('mizan_alert')",
              'showTestNotification',
          ]
          missing_service = [item for item in required_service if item not in service]
          if missing_service:
              raise SystemExit(f'Bildirim/alarm servis öğeleri eksik: {missing_service}')
          for sound in ('mizan_soft.wav', 'mizan_alert.wav'):
              data = (Path('android/app/src/main/res/raw') / sound).read_bytes()
              if len(data) < 1024 or not data.startswith(b'RIFF') or data[8:12] != b'WAVE':
                  raise SystemExit(f'Geçersiz alarm sesi: {sound}')
          print('Bildirim, alarm, boot receiver ve APK kaynak kontrolleri geçti.')
          PY

      - name: Enforce every verification gate
        run: |
          python3 - <<'PY'
          from pathlib import Path
          result_file = Path('ci-logs/results.txt')
          if not result_file.exists():
              raise SystemExit('Sonuç dosyası oluşturulamadı.')
          results = {}
          for line in result_file.read_text().splitlines():
              name, code = line.split('=', 1)
              results[name] = int(code)
          expected = {'visuals', 'launcher', 'analyze', 'requirements', 'alarm_tests', 'all_tests', 'apk'}
          missing = expected - results.keys()
          failed = {name: code for name, code in results.items() if code != 0}
          if missing or failed:
              raise SystemExit(f'Eksik={sorted(missing)}, başarısız={failed}')
          print('Alarm V6 bütün zorunlu kapıları geçti.')
          PY

      - name: Package exact verified source
        run: |
          python3 - <<'PY'
          from pathlib import Path
          import shutil
          import zipfile

          root = Path.cwd()
          dist = root / 'dist'
          stage = dist / 'LEFFERION-PRIME-MIZAN-ALARM-V6'
          archive = dist / 'LEFFERION-PRIME-MIZAN-ALARM-V6-SOURCE.zip'
          shutil.rmtree(dist, ignore_errors=True)
          stage.mkdir(parents=True)
          excluded_roots = {'.git', '.dart_tool', 'build', 'ci-logs', 'dist', 'tools/alarm_v6'}
          excluded_files = {'.flutter-plugins', '.flutter-plugins-dependencies', '.packages', 'local.properties'}
          for source in root.rglob('*'):
              relative = source.relative_to(root)
              if not relative.parts or relative.parts[0] in excluded_roots or source.name in excluded_files:
                  continue
              target = stage / relative
              if source.is_dir():
                  target.mkdir(parents=True, exist_ok=True)
              elif source.is_file():
                  target.parent.mkdir(parents=True, exist_ok=True)
                  shutil.copy2(source, target)
          with zipfile.ZipFile(archive, 'w', zipfile.ZIP_DEFLATED) as output:
              for source in stage.rglob('*'):
                  if source.is_file():
                      output.write(source, source.relative_to(stage.parent))
          print(f'Doğrulanmış kaynak: {archive} ({archive.stat().st_size} bayt)')
          PY

      - name: Upload Alarm V6 release APK
        uses: actions/upload-artifact@v4
        with:
          name: lefferion-prime-mizan-alarm-v6-release
          path: build/app/outputs/flutter-apk/app-release.apk
          if-no-files-found: error
          retention-days: 30

      - name: Upload Alarm V6 verified source
        uses: actions/upload-artifact@v4
        with:
          name: lefferion-prime-mizan-alarm-v6-verified-source
          path: dist/LEFFERION-PRIME-MIZAN-ALARM-V6-SOURCE.zip
          if-no-files-found: error
          retention-days: 30

      - name: Upload Alarm V6 screenshots
        uses: actions/upload-artifact@v4
        with:
          name: mizan-alarm-v6-ui-screenshots
          path: test/goldens/*.png
          if-no-files-found: warn
          retention-days: 30

      - name: Upload Alarm V6 diagnostics
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: mizan-alarm-v6-ci-diagnostics
          path: ci-logs/
          if-no-files-found: error
          retention-days: 14
