name: MIZAN final verification v2

on:
  pull_request:
  workflow_dispatch:

permissions:
  contents: read
  actions: read

jobs:
  verify-final:
    runs-on: ubuntu-latest
    timeout-minutes: 55
    steps:
      - uses: actions/checkout@v4

      - name: Check out actual pull request branch
        if: github.event_name == 'pull_request'
        run: |
          git fetch origin "$GITHUB_HEAD_REF" --depth=1
          git checkout -B "$GITHUB_HEAD_REF" FETCH_HEAD

      - name: Download latest verified phone source
        uses: actions/download-artifact@v4
        with:
          name: lefferion-prime-mizan-phone-feedback-verified-source
          repository: isarpsiyahofficial/MIZAN
          run-id: 29778390280
          github-token: ${{ secrets.GITHUB_TOKEN }}
          path: .baseline-artifact

      - name: Restore verified source and Round 3 layer
        shell: bash
        run: |
          set -euo pipefail
          python3 - <<'PY'
          from pathlib import Path
          import hashlib
          import shutil
          import zipfile

          root = Path.cwd()
          archives = sorted((root / '.baseline-artifact').glob('*.zip'))
          if len(archives) != 1:
              raise SystemExit(f'Beklenen tek kaynak ZIP bulunamadı: {archives}')
          archive = archives[0]
          expected = 'f12213eabfacba455c5bab593b069020bf661a1ba1ba519a6fdf6f59650f069b'
          actual = hashlib.sha256(archive.read_bytes()).hexdigest()
          if actual != expected:
              raise SystemExit(f'Kaynak ZIP SHA uyuşmuyor: {actual} != {expected}')

          extract = Path('/tmp/mizan-final-v2-base')
          preserve = Path('/tmp/mizan-final-v2-preserve')
          shutil.rmtree(extract, ignore_errors=True)
          shutil.rmtree(preserve, ignore_errors=True)
          extract.mkdir(parents=True)
          preserve.mkdir(parents=True)
          with zipfile.ZipFile(archive) as zf:
              zf.extractall(extract)
          source = extract / 'LEFFERION-PRIME-MIZAN-PHONE-FEEDBACK'
          if not source.is_dir():
              raise SystemExit(f'Kaynak kökü bulunamadı: {source}')

          keep = [
              Path('.github/workflows/final-verification-v2.yml'),
              Path('tools/apply_round3_patch.py'),
              Path('round3_patch_chunks_v2'),
              Path('round3_newfiles_chunks'),
          ]
          for relative in keep:
              current = root / relative
              target = preserve / relative
              if current.is_dir():
                  target.parent.mkdir(parents=True, exist_ok=True)
                  shutil.copytree(current, target)
              elif current.is_file():
                  target.parent.mkdir(parents=True, exist_ok=True)
                  shutil.copy2(current, target)
              else:
                  raise SystemExit(f'Korunacak final dosyası eksik: {relative}')

          for child in root.iterdir():
              if child.name == '.git':
                  continue
              if child.is_dir():
                  shutil.rmtree(child)
              else:
                  child.unlink()
          for child in source.iterdir():
              target = root / child.name
              if child.is_dir():
                  shutil.copytree(child, target)
              else:
                  shutil.copy2(child, target)
          for child in preserve.iterdir():
              target = root / child.name
              if child.is_dir():
                  shutil.copytree(child, target, dirs_exist_ok=True)
              else:
                  shutil.copy2(child, target)
          print(f'Final V2 kaynak tabanı geri yüklendi: SHA-256 {actual}')
          PY

      - name: Apply SHA-verified Round 3 revision
        shell: bash
        run: |
          mkdir -p ci-logs
          set -o pipefail
          python3 tools/apply_round3_patch.py 2>&1 | tee ci-logs/round3-patch.log

      - name: Correct rent and installment period calculations
        shell: bash
        run: |
          set -euo pipefail
          python3 - <<'PY'
          from pathlib import Path

          path = Path('lib/models/mizan_models.dart')
          text = path.read_text(encoding='utf-8')

          reference_old = '''            amount: rent.remainingAmount,
            dueDate: rent.dueDate,'''
          reference_new = '''            amount: rent.scheduledPaymentAmount,
            dueDate: rent.dueDate,'''
          if text.count(reference_old) != 1:
              raise SystemExit(
                  f'Yaklaşan kira/taksit kayıt bloğu {text.count(reference_old)} kez bulundu.'
              )
          text = text.replace(reference_old, reference_new, 1)

          monthly_old = '''              rent.isDueInMonth(month),
        )
        .fold<double>(0.0, (sum, rent) => sum + rent.remainingAmount);'''
          monthly_new = '''              rent.isDueInMonth(month),
        )
        .fold<double>(
          0.0,
          (sum, rent) => sum + rent.scheduledPaymentAmount,
        );'''
          if text.count(monthly_old) != 1:
              raise SystemExit(
                  f'Aylık kira/taksit yük bloğu {text.count(monthly_old)} kez bulundu.'
              )
          text = text.replace(monthly_old, monthly_new, 1)
          path.write_text(text, encoding='utf-8')
          print('Yaklaşan ve aylık kira/taksit hesapları dönem tutarına bağlandı.')
          PY

      - name: Add explicit installment period regression test
        shell: bash
        run: |
          cat > test/final_installment_period_test.dart <<'DART'
          import 'package:flutter_test/flutter_test.dart';
          import 'package:lefferion_prime_mizan/models/mizan_models.dart';

          void main() {
            test('kira ve taksit aylık yükü kalan bakiye yerine dönem tutarıdır', () {
              final rent = RentEntry(
                id: 'rent-final',
                title: 'Ürün taksiti',
                amount: 24000,
                paymentDay: 5,
                receiverName: 'İşletme',
                dueDate: DateTime(2026, 7, 26),
                installmentCount: 12,
                currentInstallment: 1,
                payments: [
                  PaymentRecord(
                    id: 'rent-payment',
                    amount: 2000,
                    paidAt: DateTime(2026, 7, 5),
                    entryType: PaymentEntryType.installment,
                  ),
                ],
              );
              final person = PersonAccount(
                id: 'person-final',
                name: 'Test',
                rents: [rent],
              );
              final state = MizanState(
                people: [person],
                notificationSlots: defaultNotificationSlots,
              );

              expect(rent.remainingAmount, 22000);
              expect(rent.scheduledPaymentAmount, closeTo(2200, 0.001));
              expect(person.monthlyLoadFor(DateTime(2026, 7)), closeTo(2200, 0.001));
              final reference = state
                  .recordReferencesAt(DateTime(2026, 7, 21))
                  .singleWhere((item) => item.type == RecordType.rent);
              expect(reference.amount, closeTo(2200, 0.001));
              expect(reference.amount, isNot(22000));
            });
          }
          DART

      - uses: actions/setup-java@v4
        with:
          distribution: temurin
          java-version: '17'

      - uses: subosito/flutter-action@v2
        with:
          flutter-version: '3.44.0'
          channel: stable
          cache: true

      - name: Generate Android project
        run: flutter create . --platforms=android --org com.lefferionprime --project-name lefferion_prime_mizan

      - name: Configure Android
        run: python3 tools/configure_android.py

      - name: Resolve dependencies
        run: flutter pub get

      - name: Format source
        run: dart format lib test

      - name: Run complete final diagnostics
        shell: bash
        run: |
          mkdir -p ci-logs
          : > ci-logs/results.txt
          run_check() {
            local name="$1"
            shift
            set +e
            "$@" >"ci-logs/${name}.log" 2>&1
            local code=$?
            set -e
            echo "${name}=${code}" | tee -a ci-logs/results.txt
            cat "ci-logs/${name}.log"
          }
          run_check visuals flutter test test/visual_capture_test.dart --update-goldens
          run_check launcher dart run flutter_launcher_icons
          run_check analyze flutter analyze --fatal-warnings
          run_check requirements python3 tools/validate_project.py
          run_check pdf flutter test test/pdf_report_test.dart --reporter expanded
          run_check reports flutter test test/report_service_test.dart --reporter expanded
          run_check installment flutter test test/final_installment_period_test.dart --reporter expanded
          run_check tests flutter test --reporter expanded
          run_check apk flutter build apk --release

      - name: Upload final screenshots
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: mizan-final-v2-ui-screenshots
          path: test/goldens/*.png
          if-no-files-found: warn
          retention-days: 30

      - name: Upload final diagnostics
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: mizan-final-v2-ci-diagnostics
          path: ci-logs/
          if-no-files-found: error
          retention-days: 14

      - name: Upload final APK
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: lefferion-prime-mizan-final-v2-unsigned-release
          path: build/app/outputs/flutter-apk/app-release.apk
          if-no-files-found: ignore
          retention-days: 30

      - name: Enforce every final gate
        if: always()
        run: |
          python3 - <<'PY'
          from pathlib import Path
          expected = {
              'visuals', 'launcher', 'analyze', 'requirements', 'pdf',
              'reports', 'installment', 'tests', 'apk'
          }
          path = Path('ci-logs/results.txt')
          if not path.exists():
              raise SystemExit('Final V2 sonuç dosyası oluşturulamadı.')
          results = {}
          for line in path.read_text().splitlines():
              name, code = line.split('=', 1)
              results[name] = int(code)
          missing = sorted(expected - results.keys())
          failed = {name: code for name, code in results.items() if code != 0}
          if missing:
              raise SystemExit(f'Çalıştırılmayan final kontrolleri: {missing}')
          if failed:
              raise SystemExit(f'Başarısız final kontrolleri: {failed}')
          print('MİZAN Final V2 bütün doğrulama kapılarını geçti.')
          PY

      - name: Package exact verified final source
        run: |
          python3 - <<'PY'
          from pathlib import Path
          import shutil
          import zipfile
          root = Path.cwd()
          stage = root / 'dist' / 'LEFFERION-PRIME-MIZAN-FINAL-V2'
          archive = root / 'dist' / 'LEFFERION-PRIME-MIZAN-FINAL-V2-SOURCE.zip'
          shutil.rmtree(stage.parent, ignore_errors=True)
          stage.mkdir(parents=True)
          excluded_roots = {
              '.git', '.dart_tool', 'build', 'ci-logs', 'dist',
              'round3_patch_chunks_v2', 'round3_newfiles_chunks'
          }
          excluded_files = {
              '.flutter-plugins', '.flutter-plugins-dependencies', '.packages',
              'local.properties', 'apply_round3_patch.py'
          }
          for source in root.rglob('*'):
              relative = source.relative_to(root)
              if not relative.parts:
                  continue
              if relative.parts[0] in excluded_roots or source.name in excluded_files:
                  continue
              target = stage / relative
              if source.is_dir():
                  target.mkdir(parents=True, exist_ok=True)
              elif source.is_file():
                  target.parent.mkdir(parents=True, exist_ok=True)
                  shutil.copy2(source, target)
          with zipfile.ZipFile(archive, 'w', zipfile.ZIP_DEFLATED) as output:
              for source in stage.rglob('*'):
                  if source.is_file():
                      output.write(source, source.relative_to(stage.parent))
          print(f'Final V2 kaynak ZIP: {archive} ({archive.stat().st_size} bayt)')
          PY

      - name: Upload exact verified final source
        uses: actions/upload-artifact@v4
        with:
          name: lefferion-prime-mizan-final-v2-verified-source
          path: dist/LEFFERION-PRIME-MIZAN-FINAL-V2-SOURCE.zip
          if-no-files-found: error
          retention-days: 30
